<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ Tư Vấn - SkyWings Store</title>
    <!-- Bootstrap 4.6.2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Đường dẫn CSS đồng bộ -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

    <!-- THANH MENU (NAVBAR) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand font-weight-bold text-danger" href="../index.html">🦜 SkyWings Store</a>
            <div class="navbar-nav ml-auto flex-row">
                <a class="nav-link px-3" href="../index.html">Trang chủ</a>
                <a class="nav-link px-3" href="san-pham.html">Sản phẩm</a>
                <a class="nav-link px-3" href="phu-kien.html">Phụ Kiện</a>
                <!-- Chỉ giữ class active duy nhất ở ô Liên hệ -->
                <a class="nav-link active font-weight-bold px-3" href="lien-he.html">Liên hệ</a>
            </div>
        </div>
    </nav>

    <!-- NỘI DUNG FORM LIÊN HỆ -->
    <main class="container my-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm border-0" style="border-radius: 20px;">
            <h2 class="font-weight-bold text-center mb-2 text-dark">Liên Hệ Đặt Lịch Xem Chim</h2>
            <p class="text-muted text-center mb-4">Để lại thông tin, SkyWings sẽ gọi điện hỗ trợ bạn trong vòng 15 phút!</p>
            
            <form onsubmit="event.preventDefault(); alert('Cảm ơn bạn! Đội ngũ chuyên viên SkyWings Store sẽ sớm liên hệ tư vấn siêu phẩm chim cảnh tới bạn.'); this.reset();">
                <div class="form-group">
                    <label class="font-weight-bold text-secondary">Họ và tên</label>
                    <input type="text" class="form-control form-control-lg" style="border-radius: 10px; font-size: 16px;" placeholder="Nguyễn Văn A" required>
                </div>
                
                <div class="form-group">
                    <label class="font-weight-bold text-secondary">Số điện thoại</label>
                    <input type="tel" class="form-control form-control-lg" style="border-radius: 10px; font-size: 16px;" placeholder="0901234xxx" required>
                </div>
                
                <div class="form-group">
                    <label class="font-weight-bold text-secondary">Lời nhắn gửi shop</label>
                    <textarea class="form-control" style="border-radius: 10px; font-size: 16px;" rows="4" placeholder="Mình muốn đặt mua em Chim Bồ Câu Đăng Quang Victoria và tư vấn thêm mẫu lồng phù hợp..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-danger btn-block btn-lg mt-4 shadow-sm" style="border-radius: 12px; font-weight: bold; padding: 12px;">Gửi Thông Tin Ngay</button>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="text-center py-4 bg-dark text-white mt-5">
        <p class="mb-0">&copy; 2026 SkyWings Store. Tất cả các quyền được bảo lưu.</p>
    </footer>

</body>
</html>
