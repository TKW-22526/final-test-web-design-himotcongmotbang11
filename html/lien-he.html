<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ Tư Vấn</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="index.html">❄️ AntarcticCat</a>
            <div class="navbar-nav ml-auto flex-row">
                 <a class="nav-link active px-3" href="san-pham.html">Sản phẩm</a>
                   <a class="nav-link px-3" href="phu-kien.html">Phụ Kiện</a>
                <a class="nav-link active px-3" href="lien-he.html">Liên hệ</a>
            </div>
        </div>
    </nav>

    <main class="container my-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm border-0" style="border-radius: 20px;">
            <h2 class="font-weight-bold text-center mb-4">Liên Hệ Đặt Lịch Xem Mèo</h2>
            <form onsubmit="event.preventDefault(); alert('Cảm ơn bạn! Đội ngũ tư vấn mèo Nam Cực sẽ sớm liên hệ.'); this.reset();">
                <div class="form-group">
                    <label class="font-weight-bold">Họ và tên</label>
                    <input type="text" class="form-control" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold">Số điện thoại</label>
                    <input type="tel" class="form-control" placeholder="0901234xxx" required>
                </div>
                <div class="form-group">
                    <label class="font-weight-bold">Lời nhắn gửi shop</label>
                    <textarea class="form-control" rows="4" placeholder="Mình muốn đặt mua em Mèo Đại Sứ Thân Thiện..." required></textarea>
                </div>
                <button type="submit" class="btn btn-danger btn-block btn-custom btn-lg">Gửi Thông Tin</button>
            </form>
        </div>
    </main>

    <footer class="text-center">
        <p class="mb-0">&copy; 2026 AntarcticCat Store. Tất cả các quyền được bảo lưu.</p>
    </footer>
</body>
</html>
