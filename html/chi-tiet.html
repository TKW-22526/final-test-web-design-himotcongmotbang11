<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm - SkyWings Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand font-weight-bold text-danger" href="../index.html">🦜 SkyWings Store</a>
            <div class="navbar-nav ml-auto flex-row">
                <a class="nav-link px-3" href="../index.html">Trang chủ</a>
                <a class="nav-link active px-3" href="san-pham.html">Sản phẩm</a>
                <a class="nav-link px-3" href="phu-kien.html">Phụ Kiện</a>
                <a class="nav-link px-3" href="lien-he.html">Liên hệ</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row detail-box align-items-center py-4" id="detail-container">
            <div class="col-md-6 text-center">
                <div class="image p-2 shadow-sm" style="border-radius: 24px; background: #fff; border: 1px solid #eee;">
                    <img id="detail-image" src="" alt="Ảnh sản phẩm" class="img-fluid" style="max-height: 450px; width: 100%; object-fit: cover; border-radius: 20px;">
                </div>
            </div>
            
            <div class="col-md-6 d-flex flex-column justify-content-center mt-4 mt-md-0">
                <h2 id="detail-name" class="font-weight-bold text-dark mb-2"></h2>
                <h3 id="detail-price" class="text-danger font-weight-bold mb-3"></h3>
                
                <div class="mb-3">
                    <span id="detail-status" class="badge p-2 px-3 text-white shadow-sm" style="border-radius: 10px; font-size: 14px;"></span>
                </div>

                <div class="mb-3">
                    <h5 class="font-weight-bold text-secondary mb-2"><i class="fas fa-star text-warning mr-2"></i>Đặc điểm & Phong cách:</h5>
                    <p id="detail-style" class="text-muted font-italic font-weight-bold"></p>
                </div>
                
                <div class="mb-3">
                    <h5 class="font-weight-bold text-secondary mb-2"><i class="fas fa-info-circle text-info mr-2"></i>Thông tin chi tiết & Nguồn gốc:</h5>
                    <p id="detail-description" class="text-muted"></p>
                </div>

               <div class="mb-3">
                    <h5 class="font-weight-bold text-secondary mb-2">
                        <i class="fas fa-heartbeat text-danger mr-2"></i>Tình trạng sức khỏe:
                    </h5>
                    <p id="detail-health" class="text-muted font-weight-bold" style="color: #28a745 !important;"></p>
                </div>

                <button id="add-to-cart-btn" class="btn btn-danger btn-lg btn-block mt-3 font-weight-bold shadow" style="border-radius: 15px;">
                    <i class="fas fa-shopping-cart mr-2"></i>Sở Hữu Ngay
                </button>
                <a href="san-pham.html" class="btn btn-outline-secondary btn-block mt-2 font-weight-bold" style="border-radius: 15px;">← Quay lại cửa hàng</a>
            </div>
        </div>
    </main>
        <div class="container my-5">
            <h3 class="font-weight-bold mb-4">Sản phẩm tương tự</h3>
            <div class="row" id="related-products-container">
                <!-- Các sản phẩm gợi ý sẽ được render tự động vào đây bằng JavaScript -->
            </div>
        </div>
    <footer class="text-center py-4 bg-dark text-white">
        <p class="mb-0">&copy; 2026 SkyWings Store. Tất cả các quyền được bảo lưu.</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
